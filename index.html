<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PolyFomo — what you left on the table</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#160f2e; --card:#241b4d; --card2:#2c2160; --line:#3a2e72;
    --txt:#f4eefe; --muted:#a99fce; --mint:#2ff5a8; --pink:#ff4d8d;
    --cyan:#46d6ff; --red:#ff5a78; --gold:#ffcc4d;
    --disp:'Space Grotesk',system-ui,-apple-system,sans-serif;
    --mono:'Space Mono',ui-monospace,SFMono-Regular,Menlo,monospace;
  }
  *{ box-sizing:border-box; }
  body{ margin:0; color:var(--txt); font-family:var(--disp);
        background:radial-gradient(1100px 560px at 50% -12%, #2c1a66 0%, var(--bg) 56%) fixed;
        -webkit-font-smoothing:antialiased; }
  .wrap{ max-width:860px; margin:0 auto; padding:36px 18px 80px; }

  /* header */
  .brand{ display:flex; align-items:baseline; gap:10px; }
  .logo{ font-weight:700; font-size:30px; letter-spacing:-.02em;
         background:linear-gradient(92deg,var(--mint),var(--cyan));
         -webkit-background-clip:text; background-clip:text; color:transparent; }
  .logo .fomo{ background:linear-gradient(92deg,var(--pink),#ff8a3d);
               -webkit-background-clip:text; background-clip:text; color:transparent; }
  .badge{ font-size:11px; color:var(--muted); border:1px solid var(--line);
          border-radius:999px; padding:2px 9px; font-family:var(--mono); }
  .sub{ color:var(--muted); font-size:14px; margin:8px 0 22px; max-width:54ch; line-height:1.5; }
  .sub b{ color:var(--txt); }

  /* mode tabs */
  .modes{ display:flex; gap:8px; margin-bottom:14px; }
  .mode{ flex:1; background:var(--card); border:1px solid var(--line); color:var(--muted);
         padding:11px 10px; border-radius:12px; text-align:center; cursor:pointer;
         font-size:14px; font-weight:500; font-family:var(--disp);
         transition:transform .12s, border-color .12s, color .12s; }
  .mode:hover{ transform:translateY(-1px); color:var(--txt); }
  .mode.active{ border-color:transparent; color:#10081f; font-weight:700;
                background:linear-gradient(92deg,var(--mint),var(--cyan));
                box-shadow:0 6px 20px -8px var(--mint); }

  /* input + cta */
  .bar{ display:flex; gap:10px; margin-bottom:10px; }
  input{ flex:1; background:var(--card); border:1px solid var(--line); color:var(--txt);
         padding:14px 16px; border-radius:12px; font-size:15px; outline:none; font-family:var(--disp);
         transition:border-color .12s, box-shadow .12s; }
  input::placeholder{ color:#7d72a8; }
  input:focus{ border-color:var(--cyan); box-shadow:0 0 0 3px rgba(70,214,255,.15); }
  button#go{ background:linear-gradient(92deg,var(--pink),#ff7a45); color:#fff; border:0;
             padding:14px 22px; border-radius:12px; font-size:15px; font-weight:700; cursor:pointer;
             font-family:var(--disp); transition:transform .12s, box-shadow .12s;
             box-shadow:0 8px 22px -10px var(--pink); white-space:nowrap; }
  button#go:hover{ transform:translateY(-1px); box-shadow:0 10px 26px -8px var(--pink); }
  button#go:disabled{ opacity:.5; cursor:default; transform:none; box-shadow:none; }

  .status{ color:var(--muted); font-size:13px; min-height:18px; margin:14px 2px; font-family:var(--mono); }

  /* hero total — the signature */
  .totals{ display:none; margin:6px 2px 22px; }
  .hero{ width:100%; text-align:center; padding:26px 18px;
         background:linear-gradient(180deg, rgba(47,245,168,.07), rgba(70,214,255,.03));
         border:1px solid var(--line); border-radius:20px; position:relative; overflow:hidden; }
  .hero::before{ content:""; position:absolute; left:30%; right:30%; top:-120px; height:200px;
                 background:radial-gradient(closest-side, rgba(47,245,168,.20), transparent); filter:blur(22px); }
  .hero-label{ font-family:var(--mono); font-size:12px; letter-spacing:.14em;
               text-transform:uppercase; color:var(--muted); position:relative; }
  .hero-amount{ font-weight:700; font-size:clamp(46px,9vw,78px); line-height:1; margin:6px 0 8px;
                background:linear-gradient(92deg,var(--mint),var(--cyan));
                -webkit-background-clip:text; background-clip:text; color:transparent;
                text-shadow:0 0 40px rgba(47,245,168,.22); position:relative; }
  .hero-sub{ color:var(--muted); font-size:14px; position:relative; }
  .hero-sub b{ color:var(--txt); }

  /* cards */
  .card{ position:relative; background:var(--card); border:1px solid var(--line); border-radius:16px;
         padding:16px 18px 16px 20px; margin-bottom:11px; cursor:pointer; overflow:hidden;
         animation:fade .25s ease backwards; transition:transform .12s, border-color .12s; }
  .card::before{ content:""; position:absolute; left:0; top:0; bottom:0; width:4px;
                 background:linear-gradient(180deg,var(--mint),var(--cyan)); opacity:.85; }
  .card:hover{ transform:translateY(-2px); border-color:#4a3c8e; }
  .card.open{ border-color:#5a4aa8; }
  @keyframes fade{ from{opacity:0; transform:translateY(6px);} to{opacity:1;} }
  .card .t{ font-weight:700; font-size:15px; margin-bottom:8px; padding-right:18px; line-height:1.3; }
  .chev{ float:right; color:var(--muted); font-size:12px; transition:transform .2s; margin-left:8px; }
  .card.open .chev{ transform:rotate(180deg); }
  .tag{ font-size:11px; color:var(--cyan); border:1px solid var(--line); border-radius:6px;
        padding:1px 7px; margin-left:6px; font-family:var(--mono); vertical-align:middle; }
  .row{ display:flex; flex-wrap:wrap; gap:14px; font-size:13px; color:var(--muted); margin-top:5px; }
  .row b{ color:var(--txt); font-weight:700; }
  .miss{ color:var(--mint); font-weight:700; font-size:15px; }
  .pnl-pos{ color:var(--mint); } .pnl-neg{ color:var(--red); }
  a{ color:var(--cyan); text-decoration:none; font-size:12px; font-weight:500; }
  a:hover{ text-decoration:underline; }
  .err{ background:rgba(255,90,120,.08); border:1px solid rgba(255,90,120,.35); color:#ffc2cf;
        padding:13px 15px; border-radius:12px; font-size:13px; margin-top:12px; line-height:1.5; }

  /* detail accordion */
  .detail{ margin-top:14px; border-top:1px solid var(--line); padding-top:12px; }
  .ops{ max-height:170px; overflow:auto; font-size:12px; font-family:var(--mono);
        border:1px solid var(--line); border-radius:10px; padding:8px 10px; background:rgba(0,0,0,.22); }
  .op{ padding:3px 2px; color:var(--muted); white-space:nowrap; }
  .op b{ color:var(--txt); }
  .chartbox{ height:240px; margin-top:14px; position:relative; }
  .dim{ color:var(--muted); font-size:12px; padding:8px 2px; font-family:var(--mono); }
  .evbtn{ display:inline-block; margin-top:10px; padding:7px 13px; border:1px solid var(--line);
          border-radius:10px; color:var(--cyan); font-size:12px; font-weight:500;
          transition:border-color .12s, background .12s; }
  .evbtn:hover{ border-color:var(--cyan); background:rgba(70,214,255,.08); }

  @media (max-width:560px){
    .wrap{ padding:24px 14px 64px; }
    .logo{ font-size:26px; }
    .bar{ flex-wrap:wrap; }
    button#go{ width:100%; }
  }
  /* ---- reference refinements ---- */
  .modedesc{ color:var(--muted); font-size:13px; margin:0 2px 12px; font-family:var(--mono); line-height:1.5; }
  .privacy{ color:#6f6796; font-size:12px; margin:6px 2px 0; font-family:var(--mono); }

  .card{ padding:20px 26px 20px 30px; border-color:rgba(255,255,255,.05); animation:cardIn .45s ease both; }
  .card:hover{ transform:translateY(-3px); box-shadow:0 18px 44px rgba(0,0,0,.45); border-color:rgba(255,255,255,.08); }
  @keyframes cardIn{ from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:none;} }
  .chead{ display:flex; justify-content:space-between; align-items:flex-start; gap:20px; }
  .cmain{ flex:1; min-width:0; }
  .cexp{ font-family:var(--mono); font-size:11px; color:var(--muted); white-space:nowrap; opacity:.75; }
  .cexp .chev{ float:none; }
  .card .t{ font-size:18px; }
  .seq, .stats{ display:flex; flex-wrap:wrap; align-items:flex-end; margin-top:14px;
                font-family:var(--mono); font-size:14px; gap:12px 16px; }
  .stats{ gap:12px 22px; }
  .step .lbl{ color:#6f6796; font-size:10px; letter-spacing:.08em; }
  .step .val{ font-weight:700; margin-top:3px; color:var(--txt); }
  .step .val.cyan{ color:var(--cyan); }  .step .val.orange{ color:#ff9d4d; }
  .step .val.gold{ color:var(--gold); }  .step .val.mint{ color:var(--mint); }
  .step .val.pnl-pos{ color:var(--mint); }  .step .val.pnl-neg{ color:var(--red); }
  .step .val.big{ font-size:18px; }
  .arr{ color:#6f6796; padding-bottom:2px; }

  .hero{ padding:42px 18px 38px; }
  .hero-top{ position:relative; display:flex; justify-content:space-between; align-items:center;
             max-width:560px; margin:0 auto 14px; }
  .hero-wallet{ font-family:var(--mono); font-size:12px; color:var(--muted); }
  .newscan{ font-family:var(--mono); font-size:12px; color:#cfc6e8; cursor:pointer;
            border:1px solid rgba(255,255,255,.14); border-radius:999px; padding:5px 13px; background:none; }
  .newscan:hover{ border-color:var(--cyan); color:var(--cyan); }
  .hero-amount{ font-size:clamp(56px,12vw,112px); letter-spacing:-.04em;
                filter:drop-shadow(0 0 44px rgba(47,245,168,.32)); text-shadow:none; }
  .hero-glow{ position:absolute; left:50%; top:48%; transform:translate(-50%,-50%);
              width:min(620px,86%); height:280px; pointer-events:none; filter:blur(8px); z-index:0;
              background:radial-gradient(closest-side, rgba(47,245,168,.20), rgba(70,214,255,.05) 60%, transparent);
              animation:heroPulse 4s ease-in-out infinite; }
  @keyframes heroPulse{ 0%,100%{opacity:.65;} 50%{opacity:1;} }

  @media (max-width:560px){
    .chead{ flex-direction:column-reverse; gap:8px; align-items:stretch; }
    .cexp{ align-self:flex-end; }
  }
  @media (prefers-reduced-motion:reduce){
    *{ animation:none!important; transition:none!important; }
  }

  /* ---- centered hero landing ---- */
  .intro{ display:flex; flex-direction:column; align-items:center; text-align:center;
          min-height:calc(100vh - 116px); justify-content:center; }
  body.scanned .intro{ min-height:auto; justify-content:flex-start; padding-top:6px; }

  .brand{ justify-content:center; gap:14px; margin-bottom:20px; }
  .gem{ width:42px; height:42px; border-radius:13px; transform:rotate(45deg);
        background:linear-gradient(135deg,var(--mint),var(--cyan));
        box-shadow:0 10px 34px -8px rgba(47,245,168,.55); transition:width .2s,height .2s; }
  .logo{ font-size:46px; background:none; color:var(--txt); }
  .logo .fomo{ background:linear-gradient(92deg,var(--mint),var(--cyan));
               -webkit-background-clip:text; background-clip:text; color:transparent; }
  body.scanned .logo{ font-size:30px; } body.scanned .gem{ width:30px; height:30px; }

  .tagline{ font-size:clamp(24px,3.4vw,34px); font-weight:700; letter-spacing:-.02em;
            line-height:1.15; max-width:17ch; margin-bottom:16px; }
  .intro .sub{ max-width:58ch; margin:0 0 28px; font-family:var(--mono); font-size:13px; color:var(--muted); }
  body.scanned .tagline, body.scanned .intro .sub, body.scanned .privacy{ display:none; }

  .modes{ justify-content:center; flex-wrap:wrap; }
  .mode{ flex:0 0 auto; padding:11px 24px; }
  .modedesc{ text-align:center; }
  .bar{ width:100%; max-width:640px; }
  button#go::after{ content:""; }
  .privacy{ text-align:center; }
  .dot{ display:inline-block; width:7px; height:7px; border-radius:50%; background:var(--mint);
        margin-right:8px; vertical-align:middle; box-shadow:0 0 9px var(--mint); }

  .status, .totals, #list, #error{ width:100%; }
  body:not(.scanned) .status{ text-align:center; }

  @media (max-width:560px){
    .intro{ min-height:auto; padding-top:18px; }
    .logo{ font-size:34px; } .gem{ width:32px; height:32px; }
    .tagline{ font-size:24px; }
    .bar{ flex-wrap:wrap; } button#go{ width:100%; }
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="intro" id="intro">
    <div class="brand">
      <span class="gem"></span>
      <span class="logo">Poly<span class="fomo">Fomo</span></span>
    </div>
    <div class="tagline">See the money your wallet left on the table.</div>
    <div class="sub">Sold too early? Cashed out before resolution? PolyFomo replays every Polymarket trade and prices the peak you walked away from.</div>

    <div class="modes">
      <div class="mode active" data-mode="ath">📈 ATH</div>
      <div class="mode" data-mode="res">✅ Resolution</div>
      <div class="mode" data-mode="pos">🔎 Position</div>
    </div>
    <div class="modedesc" id="modedesc"></div>

    <div class="bar">
      <input id="wallet" placeholder="0x… paste a Polymarket wallet address" spellcheck="false" value="">
      <button id="go">Scan wallet →</button>
    </div>
    <div class="bar" id="posbar" style="display:none">
      <input id="posurl" placeholder="Polymarket market link…" spellcheck="false">
    </div>
    <div class="privacy"><span class="dot"></span>Everything is computed locally in your browser. Nothing leaves this page.</div>
  </div>

  <div class="status" id="status"></div>
  <div class="totals" id="totals"></div>
  <div id="list"></div>
  <div id="error"></div>
</div>

<script src="core.js"></script>
<script>
const $ = (id) => document.getElementById(id);
const statusEl=$("status"), listEl=$("list"), errEl=$("error"), totalsEl=$("totals");
let mode = "ath";
let currentWallet = "";

const MODE_DESC = {
  ath: "The max value each position ever reached vs. what you actually cashed out.",
  res: "For markets you won — how much more the $1.00 resolution would have paid than selling early.",
  pos: "Look up one market or match by link — your trades and per-outcome totals.",
};
function applyMode(){
  $("posbar").style.display = mode==="pos" ? "flex" : "none";
  $("go").textContent = mode==="pos" ? "Look up →" : "Scan wallet →";
  $("modedesc").textContent = MODE_DESC[mode] || "";
}
document.querySelectorAll(".mode").forEach(el => el.addEventListener("click", () => {
  document.querySelectorAll(".mode").forEach(m => m.classList.remove("active"));
  el.classList.add("active"); mode = el.dataset.mode;
  applyMode();
}));
applyMode();

function batchSize(total){ return total<=50?8 : total<=200?15 : total<=1000?30 : 50; }

function countUp(el, target){
  if(!el) return;
  const fmt=v=>"$"+v.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
  if(window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches){
    el.textContent=fmt(target); return;
  }
  const dur=950, t0=performance.now();
  function step(t){
    const k=Math.min(1,(t-t0)/dur), e=1-Math.pow(1-k,3);
    el.textContent=fmt(target*e);
    if(k<1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

async function runPool(items, worker, concurrency, onEach){
  let idx=0;
  async function lane(){
    while(idx<items.length){
      const p=items[idx++];
      let r=null; try{ r=await worker(p); }catch(e){}
      onEach(r);
    }
  }
  await Promise.all(Array.from({length:Math.min(concurrency, items.length||1)}, lane));
}

/* ---------- detail accordion ---------- */
function renderChart(canvas, chart){
  if(typeof Chart === "undefined"){
    canvas.parentElement.innerHTML = '<div class="dim">chart unavailable (Chart.js didn\'t load — check internet)</div>'; return;
  }
  const pts = chart.points;
  const priceData = pts.map(p=>({x:p.ts, y:p.price}));
  const sharesData = pts.map(p=>({x:p.ts, y:p.shares}));
  const athData = (chart.ath_index>=0)?[{x:pts[chart.ath_index].ts, y:pts[chart.ath_index].price}]:[];
  const sellData = (chart.sells||[]).map(s=>({x:s.ts, y:s.price_c, _s:s}));
  new Chart(canvas, {
    data:{ datasets:[
      {type:'line', label:'Shares', data:sharesData, yAxisID:'yS', stepped:true, fill:true,
       backgroundColor:'rgba(47,245,168,0.14)', borderColor:'rgba(47,245,168,0.5)', borderWidth:1, pointRadius:0, order:4},
      {type:'line', label:'Price', data:priceData, yAxisID:'yP', borderColor:'#46d6ff', borderWidth:2,
       tension:0.25, pointRadius:0, pointHoverRadius:5, pointBackgroundColor:'#46d6ff', order:3},
      {type:'scatter', label:'Sell', data:sellData, yAxisID:'yP', pointRadius:6, pointHoverRadius:8,
       pointStyle:'triangle', rotation:180, backgroundColor:'#ff9f40', borderColor:'#241b4d', borderWidth:1, order:2},
      {type:'scatter', label:'ATH', data:athData, yAxisID:'yP', pointRadius:8, pointHoverRadius:10, pointStyle:'star',
       backgroundColor:'#ffcc4d', borderColor:'#ffcc4d', order:1},
    ]},
    options:{
      responsive:true, maintainAspectRatio:false, animation:false,
      interaction:{mode:'nearest', intersect:false},
      scales:{
        x:{type:'linear', ticks:{color:'#a99fce', maxTicksLimit:6, callback:(v)=>{
              const d=new Date(v*1000), p=n=>('0'+n).slice(-2);
              return p(d.getUTCDate())+'.'+p(d.getUTCMonth()+1)+' '+p(d.getUTCHours())+':'+p(d.getUTCMinutes());}},
           grid:{color:'rgba(255,255,255,0.05)'}},
        yP:{position:'left', ticks:{color:'#46d6ff', callback:v=>(+v).toFixed(1)+'¢'}, grid:{color:'rgba(255,255,255,0.05)'}},
        yS:{position:'right', ticks:{color:'#2ff5a8', callback:v=>Number.isInteger(+v)?v:(+v).toFixed(1)}, grid:{display:false}},
      },
      plugins:{legend:{display:false},
        tooltip:{callbacks:{
          title:(it)=>{const d=new Date(it[0].parsed.x*1000),p=n=>('0'+n).slice(-2);
            return p(d.getUTCDate())+'.'+p(d.getUTCMonth()+1)+' '+p(d.getUTCHours())+':'+p(d.getUTCMinutes());},
          label:(it)=>{const ds=it.dataset.label, y=it.parsed.y;
            if(ds==='ATH') return ' ⭐ ATH · '+y.toFixed(1)+'¢ · $'+(chart.ath_value||0).toFixed(2);
            if(ds==='Sell'){const s=it.raw._s; return ' 🔻 Sold '+s.size.toFixed(1)+' @ '+s.price_c.toFixed(1)+'¢ · Got $'+s.received.toFixed(2)+' · Left '+s.remaining.toFixed(1);}
            if(ds==='Price') return ' Price · '+y.toFixed(1)+'¢';
            if(ds==='Shares') return ' Shares · '+y.toFixed(1);
            return '';}
        }}
      }
    }
  });
}

async function loadDetail(detailEl, r){
  detailEl.innerHTML = '<div class="dim">loading details…</div>';
  try{
    const d = await core.get_position_detail(currentWallet, r);
    const ops = d.operations.map(o=>{
      const ic = o.star?'⭐':(o.side==='BUY'?'🟢':'🔴');
      return `<div class="op">${ic} ${o.side} · ${o.date} · <b>${o.size.toFixed(1)}</b> @ <b>${(o.price*100).toFixed(1)}¢</b> · Total <b>${o.total.toFixed(1)}</b></div>`;
    }).join("") || '<div class="dim">no operations</div>';
    detailEl.innerHTML = `<div class="ops">${ops}</div><div class="chartbox"><canvas></canvas></div>`;
    if(d.chart) renderChart(detailEl.querySelector("canvas"), d.chart);
    else detailEl.querySelector(".chartbox").innerHTML = '<div class="dim">no chart data available</div>';
  }catch(e){
    detailEl.innerHTML = `<div class="dim">failed to load details: ${e.message}</div>`;
  }
}

async function loadPosDetail(detailEl, m){
  const ops = m.trades.length
    ? m.trades.map(t=>{
        const ic = t.side==='BUY'?'🟢':(t.side==='SELL'?'🔴':'⚪');
        const tt = (t.type && t.type!=='TRADE') ? ` [${t.type}]` : '';
        return `<div class="op">${ic} ${t.side} · ${t.date} · <b>${t.size.toFixed(1)}</b> @ <b>${(t.price*100).toFixed(1)}¢</b> · ${t.outcome} · Total <b>${t.total.toFixed(1)}</b>${tt}</div>`;
      }).join("")
    : '<div class="dim">no operations</div>';
  detailEl.innerHTML = `<div class="ops">${ops}</div><div class="chartbox"><div class="dim">loading chart…</div></div>`;
  try{
    const d = await core.get_position_detail(currentWallet, m);
    const cb = detailEl.querySelector(".chartbox");
    if(d.chart){ cb.innerHTML='<canvas></canvas>'; renderChart(cb.querySelector("canvas"), d.chart); }
    else cb.innerHTML='<div class="dim">no chart data available</div>';
  }catch(e){
    const cb=detailEl.querySelector(".chartbox"); if(cb) cb.innerHTML=`<div class="dim">chart failed: ${e.message}</div>`;
  }
}

function attachDetail(card, r, loader){
  loader = loader || loadDetail;
  const detail = document.createElement("div");
  detail.className="detail"; detail.style.display="none";
  card.appendChild(detail);
  card.addEventListener("click",(e)=>{
    if(e.target.closest("a")) return;       // let links (market / event) work
    const open = detail.style.display!=="none";
    if(open){ detail.style.display="none"; card.classList.remove("open"); return; }
    detail.style.display="block"; card.classList.add("open");
    if(!detail.dataset.loaded){ detail.dataset.loaded="1"; loader(detail, r); }
  });
}

/* ---------- cards ---------- */
const _cents=v=>`${(v*100).toFixed(1)}¢`;
const _usd=v=>`$${(+v).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})}`;
const _int=v=>(+v).toLocaleString('en-US');
const _step=(lbl,val,cls="")=>`<div class="step"><div class="lbl">${lbl}</div><div class="val ${cls}">${val}</div></div>`;
const _arr=`<div class="arr">→</div>`;
const _expand=`<div class="cexp">tap to expand <span class="chev">⌄</span></div>`;

function athCard(r){
  const pnlCls=r.actual_pnl>=0?"pnl-pos":"pnl-neg";
  const pnlStr=(r.actual_pnl>=0?"+":"−")+_usd(Math.abs(r.actual_pnl));
  let seq;
  if(r.sold_shares>0 && r.sold_price>0){
    const beforePeak = r.last_sell_ts && r.ath_date_ts && r.last_sell_ts < r.ath_date_ts;
    const sEntry=_step("ENTRY",_cents(r.avg_entry),"cyan"), sSold=_step("SOLD",_cents(r.sold_price),"orange"), sPeak=_step("PEAK",_cents(r.ath_price)+" ★","gold");
    seq = beforePeak ? sEntry+_arr+sSold+_arr+sPeak : sEntry+_arr+sPeak+_arr+sSold;
  } else {
    seq = _step("ENTRY",_cents(r.avg_entry),"cyan")+_arr+_step("PEAK",_cents(r.ath_price)+" ★","gold");
  }
  const stats = _step("SHARES",_int(r.shares.toFixed(0)))+_step("SPENT",_usd(r.spent))
    +_step("PEAK VALUE",_usd(r.value_at_ath))+_step("P&L",pnlStr,pnlCls)+_step("MISSED",_usd(r.missed),"mint big");
  const link=r.url?`<a href="${r.url}?via=Xview" target="_blank" class="evbtn">market ↗</a>`:"";
  const d=document.createElement("div"); d.className="card";
  d.innerHTML=`<div class="chead"><div class="cmain">
      <div class="t">${r.title} ${r.outcome_side?`<span class="tag">${r.outcome_side}</span>`:""}</div>
      <div class="seq">${seq}</div>
      <div class="stats">${stats}</div>${link}
    </div>${_expand}</div>`;
  attachDetail(d, r);
  return d;
}
function resCard(r){
  const seq = (r.sold_shares>0 && r.sold_price>0)
    ? _step("BOUGHT",_cents(r.avg_entry),"cyan")+_arr+_step("SOLD",_cents(r.sold_price),"orange")+_arr+_step("RESOLVED","$1.00 ★","gold")
    : _step("BOUGHT",_cents(r.avg_entry),"cyan")+_arr+_step("RESOLVED","$1.00 ★","gold");
  const stats = _step("SHARES",_int(r.shares.toFixed(0)))+_step("SPENT",_usd(r.spent))
    +_step("MAX RETURN",_usd(r.max_return))+_step("MISSED",_usd(r.missed),"mint big");
  const link=r.url?`<a href="${r.url}?via=Xview" target="_blank" class="evbtn">market ↗</a>`:"";
  const d=document.createElement("div"); d.className="card";
  d.innerHTML=`<div class="chead"><div class="cmain">
      <div class="t">✅ ${r.title}</div>
      <div class="seq">${seq}</div>
      <div class="stats">${stats}</div>${link}
    </div>${_expand}</div>`;
  attachDetail(d, r);
  return d;
}
function posCard(m, eventTitle, eventUrl){
  const d=document.createElement("div"); d.className="card";
  const sum = m.summary.map(s=>{
    const soldPart = s.sold>0 ? ` · sold ${s.sold.toFixed(1)} (${_usd(s.received)})` : '';
    return `<b>${s.outcome}</b>: bought ${s.bought.toFixed(1)} (${_usd(s.spent)})${soldPart} · net <b>${s.net.toFixed(1)}</b>`;
  }).join("<br>") || '<span class="dim">no trades</span>';
  const evBtn = eventUrl ? `<a href="${eventUrl}" target="_blank" class="evbtn">View event ↗</a>` : "";
  d.innerHTML=`<div class="chead"><div class="cmain">
      <div class="t">🔎 ${m.question || eventTitle || 'Position'}</div>
      <div class="row"><span>${sum}</span></div>${evBtn}
    </div>${_expand}</div>`;
  attachDetail(d, m, loadPosDetail);
  return d;
}

async function runPos(){
  const wallet=$("wallet").value.trim();
  const query=$("posurl").value.trim();
  errEl.innerHTML=""; listEl.innerHTML=""; totalsEl.style.display="none"; totalsEl.innerHTML="";
  if(!/^0x[a-fA-F0-9]{6,}$/.test(wallet)){ errEl.innerHTML=`<div class="err">Enter a valid 0x wallet address.</div>`; return; }
  if(!query){ errEl.innerHTML=`<div class="err">Paste a Polymarket market link (or a conditionId).</div>`; return; }
  currentWallet = wallet;
  document.body.classList.add("scanned");
  $("go").disabled=true;
  try{
    statusEl.textContent="Finding markets…";
    const rep=await core.get_pos_report(wallet, query, (done,total)=>{
      statusEl.textContent=`Checking markets… ${done}/${total}`;
    });
    if(rep.error){ errEl.innerHTML=`<div class="err">${rep.error}</div>`; statusEl.textContent=""; $("go").disabled=false; return; }
    (rep.markets||[]).forEach(m=>listEl.appendChild(posCard(m, rep.title, rep.eventUrl)));
    if(!rep.markets || !rep.markets.length){ errEl.innerHTML=`<div class="err">No bets found for this wallet on this market/event.</div>`; statusEl.textContent=""; }
    else statusEl.textContent=`${rep.title||""} · ${rep.markets.length} market(s) with your trades`;
  }catch(e){
    errEl.innerHTML=`<div class="err">Failed: ${e.message}.</div>`; statusEl.textContent="";
  }
  $("go").disabled=false;
}

async function analyze(){
  if(mode==="pos"){ return runPos(); }
  const wallet=$("wallet").value.trim();
  errEl.innerHTML=""; listEl.innerHTML=""; totalsEl.style.display="none"; totalsEl.innerHTML="";
  if(!/^0x[a-fA-F0-9]{6,}$/.test(wallet)){ errEl.innerHTML=`<div class="err">Enter a valid 0x wallet address.</div>`; return; }
  currentWallet = wallet;
  if (core.clearCache) core.clearCache();
  document.body.classList.add("scanned");
  $("go").disabled=true;
  try{
    statusEl.textContent="Fetching positions…";
    let positions=await core.API.get_all_positions(wallet);
    const rawCount=positions.length;
    if(!positions.length){ statusEl.textContent=""; errEl.innerHTML=`<div class="err">No positions found.</div>`; $("go").disabled=false; return; }
    positions=core.filter_hedged(positions);
    const total=positions.length;
    console.log(`[DEBUG] loaded ${rawCount} positions, ${total} after hedge filter`);
    const conc=Math.min(batchSize(total),12);

    let done=0, results=[], won=0, lost=0;
    const worker=(p)=> mode==="ath" ? core.process_ath(wallet,p) : core.process_resolution(wallet,p);
    await runPool(positions, worker, conc, (r)=>{
      done++;
      if(r){
        if(mode==="ath"){ results.push(r); }
        else { if(r.outcome==="WON"){ won++; if(r.missed>0) results.push(r); } else if(r.outcome==="LOST"){ lost++; } }
      }
      statusEl.textContent=`Analyzing… ${done}/${total}`+(results.length?` · found ${results.length}`:"");
    });

    results.sort((a,b)=>b.missed-a.missed);
    listEl.innerHTML="";
    results.forEach(r=>listEl.appendChild(mode==="ath"?athCard(r):resCard(r)));
    // warm the top-20 by missed in the background → their details open instantly
    (async()=>{ for(const r of results.slice(0,20)){ try{ await core.get_position_detail(currentWallet, r); }catch(e){} } })();
    const totMissed=results.reduce((s,r)=>s+r.missed,0);
    const shortW=wallet.slice(0,6)+"…"+wallet.slice(-4);
    totalsEl.style.display="block";
    const subTxt = mode==="ath"
      ? `across <b>${results.length}</b> position${results.length===1?"":"s"} — you sold too early`
      : `<b>${won}</b> won · <b>${lost}</b> lost · <b>${results.length}</b> cashed out too early`;
    const label = mode==="ath" ? "left on the table" : "profit you didn't wait for";
    totalsEl.innerHTML=`
      <div class="hero">
        <div class="hero-glow"></div>
        <div class="hero-top"><span class="hero-wallet">${shortW} · ${mode.toUpperCase()}</span><button class="newscan" id="newscan">New scan</button></div>
        <div class="hero-label">${label}</div>
        <div class="hero-amount" id="heroAmt">$0.00</div>
        <div class="hero-sub">${subTxt}</div>
      </div>`;
    countUp($("heroAmt"), totMissed);
    $("newscan").addEventListener("click",()=>{ listEl.innerHTML=""; totalsEl.style.display="none"; totalsEl.innerHTML=""; statusEl.textContent=""; document.body.classList.remove("scanned"); $("wallet").value=""; $("wallet").focus(); });
    statusEl.textContent=`Scanned ${total} positions.`;
  }catch(e){
    errEl.innerHTML=`<div class="err">Request failed: ${e.message}.<br>If opened as a file, serve locally: <code>python -m http.server</code> then <code>http://localhost:8000</code>.</div>`;
    statusEl.textContent="";
  }
  $("go").disabled=false;
}
$("go").addEventListener("click", analyze);
$("wallet").addEventListener("keydown", e=>{ if(e.key==="Enter") analyze(); });
</script>
</body>
